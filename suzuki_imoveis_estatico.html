    const decryptCredentials = (encrypted) => {
      try {
        const raw_1 = decodeURIComponent(escape(atob(encrypted)));
        const reversed = raw_1.split('').reverse().join('');
        const raw_2 = decodeURIComponent(escape(atob(reversed)));
        return JSON.parse(raw_2);
      } catch (err) {
        console.error("Erro ao decodificar credenciais ofuscadas:", err);
        return null;
      }
    };

    const encryptCredentials = (url, key) => {
      const payload = JSON.stringify({ url, key });
      const b64_1 = btoa(unescape(encodeURIComponent(payload)));
      const reversed = b64_1.split('').reverse().join('');
      return btoa(unescape(encodeURIComponent(reversed)));
    };

    const getSupabaseConfig = () => {
      let url = localStorage.getItem('suzuki_sb_url') || '';
      let key = localStorage.getItem('suzuki_sb_key') || '';
      let enabled = localStorage.getItem('suzuki_sb_enabled') === 'true';

      if ((!url || !key) && window.SUZUKI_SECURED_CONFIG) {
        const decrypted = decryptCredentials(window.SUZUKI_SECURED_CONFIG);
        if (decrypted && decrypted.url && decrypted.key) {
          url = decrypted.url;
          key = decrypted.key;
          enabled = true;
        }
      }

      return { url, key, enabled };
    };

    const saveSupabaseConfig = (url, key, enabled) => {
      localStorage.setItem('suzuki_sb_url', url.trim());
      localStorage.setItem('suzuki_sb_key', key.trim());
      localStorage.setItem('suzuki_sb_enabled', enabled ? 'true' : 'false');
    };

    const getSupabaseClient = () => {
      const { url, key, enabled } = getSupabaseConfig();
      if (!enabled || !url || !key || !window.supabase) return null;
      try {
        return window.supabase.createClient(url, key, {
          auth: { persistSession: false }
        });
      } catch (err) {
        console.error('Erro ao inicializar Supabase client:', err);
        return null;
      }
    };

    const dbFetchProperties = async () => {
      const client = getSupabaseClient();
      if (!client) return null;
      const { data, error } = await client.from('suzuki_properties').select('*').order('createdAt', { ascending: false });
      if (error) throw error;
      return data;
    };

    const dbSaveProperty = async (property) => {
      const client = getSupabaseClient();
      if (!client) return;
      const { error } = await client.from('suzuki_properties').upsert(property, { onConflict: 'id' });
      if (error) throw error;
    };

    const dbDeleteProperty = async (id) => {
      const client = getSupabaseClient();
      if (!client) return;
      const { error } = await client.from('suzuki_properties').delete().eq('id', id);
      if (error) throw error;
    };

    const dbFetchBookings = async () => {
      const client = getSupabaseClient();
      if (!client) return null;
      const { data, error } = await client.from('suzuki_bookings').select('*').order('createdAt', { ascending: false });
      if (error) throw error;
      return data;
    };

    const dbSaveBooking = async (booking) => {
      const client = getSupabaseClient();
      if (!client) return;
      const { error } = await client.from('suzuki_bookings').upsert(booking, { onConflict: 'id' });
      if (error) throw error;
    };

    const dbDeleteBooking = async (id) => {
      const client = getSupabaseClient();
      if (!client) return;
      const { error } = await client.from('suzuki_bookings').delete().eq('id', id);
      if (error) throw error;
    };

    const dbSyncLocalToCloud = async (localProperties, localBookings) => {
      const client = getSupabaseClient();
      if (!client) throw new Error('Supabase não está configurado ou ativo.');
      
      let propertiesSynced = 0;
      let bookingsSynced = 0;
      
      if (localProperties.length > 0) {
        const { error } = await client.from('suzuki_properties').upsert(localProperties, { onConflict: 'id' });
        if (error) throw error;
        propertiesSynced = localProperties.length;
      }
      
      if (localBookings.length > 0) {
        const { error } = await client.from('suzuki_bookings').upsert(localBookings, { onConflict: 'id' });
        if (error) throw error;
        bookingsSynced = localBookings.length;
      }
      
      return { propertiesSynced, bookingsSynced };
    };

    const testSupabaseConnection = async (url, key) => {
      try {
        if (!window.supabase) return false;
        const client = window.supabase.createClient(url, key);

    function App() {
      // Views & State
      const [currentView, setCurrentView] = useState('home'); // 'home' | 'admin'
      const [properties, setProperties] = useState(() => {
        const saved = localStorage.getItem('suzuki_properties');
        return saved ? JSON.parse(saved) : INITIAL_PROPERTIES;
      });
      const [bookings, setBookings] = useState(() => {
        const saved = localStorage.getItem('suzuki_bookings');
        return saved ? JSON.parse(saved) : [];
      });
      const [favorites, setFavorites] = useState(() => {
        const saved = localStorage.getItem('suzuki_favorites');
        return saved ? JSON.parse(saved) : [];
      });

      // Load properties and bookings from Supabase on start and keep them synchronized (polling)
      useEffect(() => {
        const fetchAllFromCloud = async () => {
          const config = getSupabaseConfig();
          if (config.enabled && config.url && config.key) {
            try {
              // Fetch properties
              const cloudProps = await dbFetchProperties();
              if (cloudProps) {
                setProperties(cloudProps);
              }
              // Fetch bookings
              const cloudBookings = await dbFetchBookings();
              if (cloudBookings) {
                setBookings(cloudBookings);
              }
            } catch (err) {
              console.error('Falha ao sincronizar em segundo plano com o Supabase. Usando cópia local.', err);
            }
          }
        };

        // Initial fetch
        fetchAllFromCloud();

        // Setup interval for automatic real-time synchronization every 10 seconds
        const intervalId = setInterval(() => {
          fetchAllFromCloud();
        }, 10000);

        return () => clearInterval(intervalId);
      }, []);

      // Filter State

        search: '',

      const filteredProperties = useMemo(() => {
        return properties.filter(p => {
          if (filters.type !== 'todos' && p.type !== filters.type) return false;
          if (filters.propertyType !== 'todos' && p.propertyType !== filters.propertyType) return false;
          if (filters.city !== 'todas' && p.city !== filters.city) return false;
          
          if (filters.minPrice && p.price < Number(filters.minPrice)) return false;
          if (filters.maxPrice && p.price > Number(filters.maxPrice)) return false;
          if (filters.minArea && p.area < Number(filters.minArea)) return false;

          if (filters.bedrooms !== 'todos') {

          const raw = d.toISOString().slice(0, 10);

      const handleSchedule = (e) => {

      const simulationResult = useMemo(() => {
        const price = property.price;

        const fin = Math.max(0, price - down);

        const monthlyRate = (simData.rate / 100) / 12;
        const months = simData.years * 12;
        const amortization = fin / months;
        const first = amortization + (fin * monthlyRate);
        const last = amortization + (amortization * monthlyRate);
        const total = ((first + last) / 2) * months + down;

        return { fin, first, last, total };
      }, [simData, property]);

      return (
        <div className="fixed inset-0 z-50 bg-stone-900/65 backdrop-blur-sm flex items-center justify-center p-2 sm:p-4 overflow-y-auto">

                            <select value={simData.years} onChange={(e) => setSimData({...simData, years: Number(e.target.value)})} className="w-full px-2 py-1.5 bg-white border border-stone-200 rounded text-xs">

                          </div>
                          <div>
                            <span className="text-[9px] text-stone-400 block font-mono">ÚLTIMA PARCELA</span>
                            <span className="text-xs font-bold font-mono text-brand-gold">{formatCurrency(simulationResult.last)}</span>
                          </div>
                          <div>
                            <span className="text-[9px] text-stone-400 block font-mono">CUSTO TOTAL</span>
                            <span className="text-xs font-bold font-mono">{formatCurrency(simulationResult.total)}</span>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Booking Scheduler sidebar */}
              <div className="space-y-6">
                <div className="p-5 bg-stone-900 text-white rounded-xl space-y-3">
                  <span className="text-[9px] font-mono text-brand-gold uppercase block">Valor pedido</span>

                  <div className="grid grid-cols-2 gap-3 text-[10px] font-mono border-t border-stone-800 pt-3 text-stone-400">
                    <div>

                    <div>
                      <span>IPTU Anual</span>
                      <p className="text-white font-bold">{property.iptu ? formatCurrency(property.iptu) : 'R$ 0,00'}</p>
                    </div>
                  </div>
                  <button onClick={() => window.open(`https://api.whatsapp.com/send?phone=5511970199648&text=Olá! Venho do site Suzuki Imóveis e gostaria de informações sobre o imóvel ${property.code}`)} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-xs font-bold text-center text-white uppercase mt-2 cursor-pointer">
                    Falar com Corretor
                  </button>

                {/* Visita scheduler */}
                <div className="p-5 bg-white border border-stone-200 rounded-xl space-y-4 shadow-sm">

                    <span className="px-2 py-0.5 bg-gold-50 text-gold-800 text-[9px] font-bold font-mono uppercase rounded">VISITA EXPRESS</span>
                    <h3 className="text-sm font-bold mt-1 text-stone-900">Agende Visita Gratuita</h3>
                    <p className="text-[10px] text-stone-400 mt-0.5">Sem custos ou compromissos comerciais</p>

                  {booked ? (
                    <div className="text-center py-4 space-y-2">

                      <h4 className="font-bold text-sm text-stone-900">Solicitação Enviada!</h4>
                      <p className="text-[11px] text-stone-500">Agendamento de visita registrado com sucesso. Redirecionando WhatsApp de confirmação em instantes...</p>

                        <button type="button" onClick={() => setVisitType('presencial')} className={`py-1.5 border text-[10px] font-bold rounded ${visitType === 'presencial' ? 'bg-brand-gold border-brand-gold text-white' : 'bg-stone-50 border-stone-200 text-stone-500'}`}>Presencial</button>
                        <button type="button" onClick={() => setVisitType('virtual')} className={`py-1.5 border text-[10px] font-bold rounded ${visitType === 'virtual' ? 'bg-brand-gold border-brand-gold text-white' : 'bg-stone-50 border-stone-200 text-stone-500'}`}>Vídeo</button>
                      </div>

                      {/* Horizontal Calendar */}
                      <div className="space-y-1">
                        <span className="text-[9px] font-mono text-stone-400 block font-bold uppercase">SELECIONE O DIA</span>
                        <div className="flex space-x-1.5 overflow-x-auto pb-1.5 scrollbar-none">
                          {next6Days.map(d => (
                            <button key={d.raw} type="button" onClick={() => setSelDate(d.raw)} className={`flex flex-col items-center justify-center p-1.5 border rounded min-w-[54px] flex-shrink-0 font-mono text-center cursor-pointer ${selDate === d.raw ? 'bg-stone-950 border-stone-950 text-white' : 'bg-stone-50 text-stone-500 hover:border-stone-300'}`}>
                              <span className="text-[8px] uppercase">{d.wk}</span>
                              <span className="text-xs font-extrabold">{d.dayNum}</span>
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="grid grid-cols-4 gap-1">
                        {["09:00", "11:00", "14:00", "16:00"].map(t => (
                          <button key={t} type="button" onClick={() => setSelTime(t)} className={`py-1 border text-[10px] font-bold font-mono rounded cursor-pointer ${selTime === t ? 'bg-brand-gold border-brand-gold text-white' : 'bg-stone-50 border-stone-150 text-stone-500'}`}>{t}</button>
                        ))}
                      </div>

                      <div className="space-y-2 border-t pt-2">
                        <input type="text" required placeholder="Seu Nome completo" value={clName} onChange={(e) => setClName(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border border-stone-200 rounded text-xs" />
                        <input type="tel" required placeholder="WhatsApp (DDD)" value={clPhone} onChange={(e) => setClPhone(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border border-stone-200 rounded text-xs" />
                      </div>

                      <button type="submit" className="w-full py-2.5 bg-brand-gold hover:bg-brand-gold-dark text-white rounded-lg font-bold text-xs uppercase tracking-wider shadow-md shadow-brand-gold/15 cursor-pointer">
                        Solicitar Horário
                      </button>
                    </form>
                  )}
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // --- CORRETOR / ADMIN PANEL ---
    function AdminPanel({ properties, setProperties, bookings, setBookings }) {
      const [pass, setPass] = useState('');
      const [authed, setAuthed] = useState(false);
      const [tab, setTab] = useState('list'); // 'list' | 'add' | 'bookings' | 'database'
      const [editingProp, setEditingProp] = useState(null);

      // Supabase Database Settings States
      const [dbUrl, setDbUrl] = useState('');
      const [dbKey, setDbKey] = useState('');
      const [dbEnabled, setDbEnabled] = useState(false);
      const [testStatus, setTestStatus] = useState('idle'); // 'idle' | 'testing' | 'success' | 'error'
      const [syncStatus, setSyncStatus] = useState('idle'); // 'idle' | 'syncing' | 'success' | 'error'
      const [syncResult, setSyncResult] = useState(null);
      const [copiedSql, setCopiedSql] = useState(false);

      // Load database configuration
      useEffect(() => {
        const config = getSupabaseConfig();
        setDbUrl(config.url);
        setDbKey(config.key);
        setDbEnabled(config.enabled);
      }, []);

      // Form states
      const [code, setCode] = useState('');
      const [title, setTitle] = useState('');
      const [desc, setDesc] = useState('');
      const [type, setType] = useState('venda');
      const [pType, setPType] = useState('casa');
      const [price, setPrice] = useState('');
      const [condo, setCondo] = useState('');
      const [iptu, setIptu] = useState('');
      const [bedrooms, setBedrooms] = useState('2');
      const [bathrooms, setBathrooms] = useState('2');
      const [suites, setSuites] = useState('1');
      const [garages, setGarages] = useState('1');
      const [area, setArea] = useState('');
      const [city, setCity] = useState('São Paulo');
      const [neigh, setNeigh] = useState('');
      const [address, setAddress] = useState('');
      const [img1, setImg1] = useState('');
      const [img2, setImg2] = useState('');
      const [badge, setBadge] = useState('Pronto');

      const handleLogin = (e) => {
        e.preventDefault();
        if (pass === 'admin123' || pass === 'suzuki2026' || pass === '123') {
          setAuthed(true);
        } else {
          alert('Senha inválida de corretor!');
        }
      };

      const handleSaveDbConfig = (e) => {
        e.preventDefault();
        saveSupabaseConfig(dbUrl, dbKey, dbEnabled);
        alert('Configurações do banco de dados salvas!');
        if (dbEnabled) {
          alert('Conexão configurada e ativada! Recarregue a página para atualizar a vitrine de imóveis com o banco Supabase.');
        }
      };

      const handleTestConnection = async () => {
        if (!dbUrl || !dbKey) {
          alert('Por favor, preencha a URL e a Chave Anon antes de testar!');
          return;
        }
        setTestStatus('testing');
        const isOk = await testSupabaseConnection(dbUrl, dbKey);
        if (isOk) {
          setTestStatus('success');
          setTimeout(() => setTestStatus('idle'), 4000);
        } else {
          setTestStatus('error');
          setTimeout(() => setTestStatus('idle'), 4000);
        }
      };

      const handleSyncDataToCloud = async () => {
        const config = getSupabaseConfig();
        if (!config.enabled || !config.url || !config.key) {
          alert('Ative e salve a configuração do Supabase antes de sincronizar os dados!');
          return;
        }
        if (confirm('Deseja enviar todo o seu portfólio de imóveis e registros de agendamento do navegador atual para o seu Supabase na nuvem? Isso irá criar/mesclar com os dados lá.')) {
          setSyncStatus('syncing');
          try {
            const result = await dbSyncLocalToCloud(properties, bookings);
            setSyncResult(result);
            setSyncStatus('success');
            alert('Dados sincronizados com sucesso para o Supabase Cloud!');
          } catch (err) {
            console.error(err);
            setSyncStatus('error');
            alert('Erro ao sincronizar: ' + (err.message || err) + '. Certifique-se de que executou o script SQL de tabelas no seu banco Supabase!');
          }
        }
      };

      const handleCopySql = () => {
        navigator.clipboard.writeText(SUPABASE_SQL_SETUP);
        setCopiedSql(true);
        setTimeout(() => setCopiedSql(false), 2500);
      };

      const startEdit = (p) => {
        setEditingProp(p);
        setCode(p.code);
        setTitle(p.title);
        setDesc(p.description);
        setType(p.type);
        setPType(p.propertyType);
        setPrice(p.price);
        setCondo(p.condo || '');
        setIptu(p.iptu || '');
        setBedrooms(String(p.bedrooms));
        setBathrooms(String(p.bathrooms));
        setSuites(String(p.suites));
        setGarages(String(p.garages));
        setArea(p.area);
        setCity(p.city);
        setNeigh(p.neighborhood);
        setAddress(p.address);
        setImg1(p.images[0] || '');
        setImg2(p.images[1] || '');
        setBadge(p.badge || 'Pronto');
        setTab('add');
      };

      const handleSave = (e) => {
        e.preventDefault();
        if(!code || !title || !price || !area) {
          alert('Preencha os campos obrigatórios!');
          return;
        }

        const imagesArr = [];
        if (img1) imagesArr.push(img1);
        if (img2) imagesArr.push(img2);
        if (imagesArr.length === 0) {
          imagesArr.push('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1200&q=80');
        }

        const propObj = {
          id: editingProp ? editingProp.id : `sz-${Date.now()}`,
          code,
          title,
          description: desc,
          type,
          propertyType: pType,
          price: Number(price),
          condo: condo ? Number(condo) : 0,
          iptu: iptu ? Number(iptu) : 0,
          bedrooms: Number(bedrooms),
          bathrooms: Number(bathrooms),
          suites: Number(suites),
          garages: Number(garages),
          area: Number(area),
          city,
          neighborhood: neigh || 'Bairro central',
          state: city === 'Curitiba' ? 'PR' : 'SP',
          address: address || 'Endereço Comercial',
          images: imagesArr,
          featured: editingProp ? editingProp.featured : false,
          badge,
          createdAt: editingProp ? editingProp.createdAt : new Date().toISOString()
        };

        if (editingProp) {
          setProperties(prev => prev.map(item => item.id === editingProp.id ? propObj : item));
          const config = getSupabaseConfig();
          if (config.enabled) {
            dbSaveProperty(propObj).catch(err => console.error("Falha ao salvar propriedade no Supabase:", err));
          }
          setEditingProp(null);
          alert('Imóvel atualizado com sucesso!');
        } else {
          setProperties(prev => [propObj, ...prev]);
          const config = getSupabaseConfig();
          if (config.enabled) {
            dbSaveProperty(propObj).catch(err => console.error("Falha ao salvar propriedade no Supabase:", err));
          }
          alert('Novo imóvel inserido no catálogo!');
        }

        // Reset
        setCode('');
        setTitle('');
        setDesc('');
        setPrice('');
        setCondo('');
        setIptu('');
        setArea('');
        setNeigh('');
        setAddress('');
        setImg1('');
        setImg2('');
        setTab('list');
      };

      const deleteProp = (id) => {
        if(confirm('Tem certeza de que deseja deletar este imóvel?')) {
          setProperties(prev => prev.filter(p => p.id !== id));
          const config = getSupabaseConfig();
          if (config.enabled) {
            dbDeleteProperty(id).catch(err => console.error("Falha ao deletar propriedade no Supabase:", err));
          }
        }
      };

      // Backup systems
      const exportBackup = () => {
        const full = { properties, bookings };
        const blob = new Blob([JSON.stringify(full, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_suzuki_imoveis_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
      };

      const importBackup = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if(data.properties) setProperties(data.properties);
            if(data.bookings) setBookings(data.bookings);
            alert('Backup importado com absoluto sucesso!');
          } catch(err) {
            alert('Falha ao processar arquivo de backup.');
          }
        };
        reader.readAsText(file);
      };

      if (!authed) {
        return (
          <div className="max-w-md mx-auto py-24 px-4">
            <div className="bg-white border border-stone-200 rounded-2xl shadow-xl p-8 space-y-6">
              <div className="text-center space-y-2">
                <div className="p-3 bg-stone-900 text-brand-gold rounded-full inline-block">
                  <Icon name="shield" className="h-6 w-6" />
                </div>
                <h2 className="text-xl font-bold text-stone-900">Acesso Restrito - Corretores</h2>
                <p className="text-xs text-stone-500">Digite a chave de credencial de corretor cadastrada.</p>
              </div>

              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1.5 uppercase font-bold">Chave de Segurança</label>
                  <input 
                    type="password" 
                    required
                    placeholder="Ex: admin123 ou suzuki2026" 
                    value={pass}
                    onChange={(e) => setPass(e.target.value)}
                    className="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg outline-none text-xs focus:border-brand-gold text-center font-mono"
                  />
                </div>
                <button type="submit" className="w-full py-2.5 bg-stone-900 hover:bg-stone-950 text-white rounded-lg font-bold text-xs uppercase tracking-wider cursor-pointer">
                  Autenticar Acesso
                </button>
              </form>

              <div className="text-center pt-2">
                <span className="text-[10px] text-stone-400 block">* Dica de teste: Use <strong>admin123</strong> ou <strong>suzuki2026</strong></span>
              </div>
            </div>
          </div>
        );
      }

      const handleDeleteBooking = (id) => {
        if(confirm('Tem certeza de que deseja deletar este agendamento de visita?')) {
          setBookings(prev => prev.filter(item => item.id !== id));
          const config = getSupabaseConfig();
          if (config.enabled) {
            dbDeleteBooking(id).catch(err => console.error("Falha ao deletar agendamento no Supabase:", err));
          }
        }
      };

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-8">
          
          {/* Admin Header */}
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-stone-200 pb-5 space-y-3 sm:space-y-0">
            <div>
              <h2 className="text-2xl font-black text-stone-900">Espaço Digital do Corretor</h2>
              <p className="text-xs text-stone-500 mt-1">Gerenciamento imediato de imóveis, visitas de clientes e integridade de dados.</p>
            </div>
            
            {/* Action backups buttons */}
            <div className="flex space-x-2">
              <button onClick={exportBackup} className="flex items-center space-x-1 px-3 py-1.5 bg-stone-100 hover:bg-stone-200 border text-stone-600 rounded-lg text-xs font-semibold cursor-pointer">
                <Icon name="download" className="h-3.5 w-3.5" />
                <span>Exportar Dados</span>
              </button>
              <label className="flex items-center space-x-1 px-3 py-1.5 bg-stone-100 hover:bg-stone-200 border text-stone-600 rounded-lg text-xs font-semibold cursor-pointer">
                <Icon name="upload" className="h-3.5 w-3.5" />
                <span>Importar Dados</span>
                <input type="file" accept=".json" onChange={importBackup} className="hidden" />
              </label>
            </div>
          </div>

          {/* Admin Tabs Nav */}
          <div className="flex space-x-4 border-b border-stone-200 pb-0.5">
            <button onClick={() => setTab('list')} className={`pb-2.5 text-xs font-bold uppercase border-b-2 transition-all cursor-pointer ${tab === 'list' ? 'border-brand-gold text-brand-gold-dark' : 'border-transparent text-stone-500 hover:text-stone-900'}`}>Lista de Imóveis</button>
            <button onClick={() => { setEditingProp(null); setTab('add'); }} className={`pb-2.5 text-xs font-bold uppercase border-b-2 transition-all cursor-pointer ${tab === 'add' ? 'border-brand-gold text-brand-gold-dark' : 'border-transparent text-stone-500 hover:text-stone-900'}`}>{editingProp ? 'Editando Imóvel' : 'Cadastrar Novo'}</button>
            <button onClick={() => setTab('bookings')} className={`pb-2.5 text-xs font-bold uppercase border-b-2 transition-all cursor-pointer ${tab === 'bookings' ? 'border-brand-gold text-brand-gold-dark' : 'border-transparent text-stone-500 hover:text-stone-900'}`}>Solicitações de Visita ({bookings.length})</button>
            <button onClick={() => setTab('database')} className={`pb-2.5 text-xs font-bold uppercase border-b-2 transition-all cursor-pointer ${tab === 'database' ? 'border-brand-gold text-brand-gold-dark' : 'border-transparent text-stone-500 hover:text-stone-900'}`}>Banco Supabase</button>
          </div>

          {tab === 'list' && (
            <div className="bg-white border rounded-xl shadow-sm overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left text-xs font-sans">
                  <thead className="bg-stone-50 border-b text-stone-500 uppercase font-mono text-[9px] font-bold">
                    <tr>
                      <th className="px-6 py-3.5">Código</th>
                      <th className="px-6 py-3.5">Título</th>
                      <th className="px-6 py-3.5">Cidade</th>
                      <th className="px-6 py-3.5">Preço</th>
                      <th className="px-6 py-3.5">Modalidade</th>
                      <th className="px-6 py-3.5 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-stone-100">
                    {properties.map(p => (
                      <tr key={p.id} className="hover:bg-stone-50/75">
                        <td className="px-6 py-4 font-mono font-bold text-stone-900">{p.code}</td>
                        <td className="px-6 py-4 font-semibold text-stone-800 truncate max-w-xs">{p.title}</td>
                        <td className="px-6 py-4">{p.city} - {p.neighborhood}</td>
                        <td className="px-6 py-4 font-mono font-semibold">R$ {p.price.toLocaleString('pt-BR')}</td>
                        <td className="px-6 py-4">
                          <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase text-white ${p.type === 'venda' ? 'bg-brand-gold' : 'bg-stone-800'}`}>
                            {p.type}
                          </span>
                        </td>
                        <td className="px-6 py-4 text-right flex justify-end space-x-1.5">
                          <button onClick={() => startEdit(p)} className="p-1.5 bg-stone-100 hover:bg-stone-200 rounded text-stone-600 cursor-pointer" title="Editar Ficha">
                            <Icon name="edit" className="h-4.5 w-4.5" />
                          </button>
                          <button onClick={() => deleteProp(p.id)} className="p-1.5 bg-red-50 hover:bg-red-100 rounded text-red-600 cursor-pointer" title="Remover">
                            <Icon name="trash" className="h-4.5 w-4.5" />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {tab === 'add' && (
            <form onSubmit={handleSave} className="bg-white border rounded-xl shadow-md p-6 sm:p-8 space-y-6">
              <h3 className="text-base font-extrabold text-stone-900 font-sans border-b pb-3 border-stone-100">
                {editingProp ? `Editando Propriedade [Código: ${editingProp.code}]` : 'Formulário de Cadastro de Imóvel'}
              </h3>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Código Interno *</label>
                  <input type="text" required placeholder="Ex: SZ105" value={code} onChange={(e) => setCode(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Título do Anúncio *</label>
                  <input type="text" required placeholder="Ex: Casa Duplex de Luxo com SPA" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs col-span-2" />
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Preço de Venda ou Locação *</label>
                  <input type="number" required placeholder="Ex: 1450000" value={price} onChange={(e) => setPrice(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs font-mono" />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-4 gap-6">
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Negociação</label>
                  <select value={type} onChange={(e) => setType(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs">
                    <option value="venda">Venda</option>
                    <option value="aluguel">Aluguel</option>
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Tipo Físico</label>
                  <select value={pType} onChange={(e) => setPType(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs">
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                    <option value="comercial">Comercial</option>
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Área Útil (m²) *</label>
                  <input type="number" required placeholder="Ex: 180" value={area} onChange={(e) => setArea(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs font-mono" />
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Selo Comercial</label>
                  <select value={badge} onChange={(e) => setBadge(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs">
                    <option value="Pronto">Pronto</option>
                    <option value="Em Construção">Em Construção</option>
                    <option value="Lançamento">Lançamento</option>
                    <option value="Nenhum">Nenhum</option>
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-4 gap-6">
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Cidade</label>
                  <select value={city} onChange={(e) => setCity(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs">
                    {CITIES_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Bairro</label>
                  <input type="text" placeholder="Ex: Pinheiros" value={neigh} onChange={(e) => setNeigh(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
                </div>
                <div className="sm:col-span-2">
                  <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Endereço de Referência</label>
                  <input type="text" placeholder="Ex: Rua Pamplona, 1200" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
                </div>
              </div>

              {/* Physical details rooms */}
              <div className="grid grid-cols-4 gap-4 p-4 bg-stone-50 rounded-xl">
                <div>
                  <span className="text-[9px] font-mono text-stone-400 block font-bold">QUARTOS</span>
                  <select value={bedrooms} onChange={(e) => setBedrooms(e.target.value)} className="w-full px-2 py-1 bg-white border rounded text-xs">
                    {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div>
                  <span className="text-[9px] font-mono text-stone-400 block font-bold">BANHEIROS</span>
                  <select value={bathrooms} onChange={(e) => setBathrooms(e.target.value)} className="w-full px-2 py-1 bg-white border rounded text-xs">
                    {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div>
                  <span className="text-[9px] font-mono text-stone-400 block font-bold">SUÍTES</span>
                  <select value={suites} onChange={(e) => setSuites(e.target.value)} className="w-full px-2 py-1 bg-white border rounded text-xs">
                    {[0,1,2,3,4].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div>
                  <span className="text-[9px] font-mono text-stone-400 block font-bold">VAGAS GARAGEM</span>
                  <select value={garages} onChange={(e) => setGarages(e.target.value)} className="w-full px-2 py-1 bg-white border rounded text-xs">
                    {[0,1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
              </div>

              <div className="space-y-1.5">
                <label className="text-[10px] font-mono text-stone-400 block uppercase font-bold">Descrição Completa</label>
                <textarea rows="3" placeholder="Insira detalhes adicionais do imóvel aqui..." value={desc} onChange={(e) => setDesc(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
              </div>

              {/* Images selection helpers */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div className="space-y-1.5">
                  <span className="text-[10px] font-mono text-stone-400 block uppercase font-bold">URL da Imagem Principal (Capa)</span>
                  <input type="text" placeholder="Ex: https://images.unsplash.com/photo-..." value={img1} onChange={(e) => setImg1(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
                  <div className="flex flex-wrap gap-1.5 pt-1.5">
                    {PRESET_IMAGE_OPTIONS.map((opt, idx) => (
                      <button key={idx} type="button" onClick={() => setImg1(opt.url)} className="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded text-[9px] text-stone-600">{opt.label}</button>
                    ))}
                  </div>
                </div>
                <div className="space-y-1.5">
                  <span className="text-[10px] font-mono text-stone-400 block uppercase font-bold">URL da Imagem Secundária</span>
                  <input type="text" placeholder="Ex: https://images.unsplash.com/photo-..." value={img2} onChange={(e) => setImg2(e.target.value)} className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs" />
                </div>
              </div>

              <div className="flex space-x-3 pt-4 border-t border-stone-100">
                <button type="submit" className="px-6 py-2.5 bg-brand-gold hover:bg-brand-gold-dark text-white text-xs font-bold uppercase rounded-lg">
                  {editingProp ? 'Salvar Edição' : 'Cadastrar Imóvel'}
                </button>
                <button type="button" onClick={() => { setEditingProp(null); setTab('list'); }} className="px-4 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 text-xs font-bold uppercase rounded-lg">Cancelar</button>
              </div>
            </form>
          )}

          {tab === 'bookings' && (
            <div className="bg-white border rounded-xl shadow-sm overflow-hidden">
              <div className="p-4 bg-stone-50 border-b">
                <span className="text-[10px] font-mono text-stone-400 uppercase font-bold">Histórico de Reservas Realizadas</span>
              </div>
              {bookings.length === 0 ? (
                <div className="p-12 text-center text-stone-500 text-xs">
                  Nenhuma solicitação de visita agendada até o momento.
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs font-sans">
                    <thead className="bg-stone-50 border-b text-stone-500 uppercase font-mono text-[9px] font-bold">
                      <tr>
                        <th className="px-6 py-3">Cód. Imóvel</th>
                        <th className="px-6 py-3">Cliente</th>
                        <th className="px-6 py-3">Data & Hora</th>
                        <th className="px-6 py-3">Modalidade</th>
                        <th className="px-6 py-3 text-right">Ações</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-stone-100">
                      {bookings.map(b => (
                        <tr key={b.id} className="hover:bg-stone-50/75">
                          <td className="px-6 py-4 font-mono font-bold">{b.propertyCode}</td>
                          <td className="px-6 py-4">
                            <span className="font-bold text-stone-900 block">{b.clientName}</span>
                            <span className="text-[10px] text-stone-400 block">{b.clientPhone}</span>
                          </td>
                          <td className="px-6 py-4">
                            <span className="font-semibold block">{b.date}</span>
                            <span className="text-[10px] font-mono text-stone-400">{b.timeSlot}</span>
                          </td>
                          <td className="px-6 py-4 capitalize font-mono text-[10px]">
                            {b.visitType}
                          </td>
                          <td className="px-6 py-4 text-right flex justify-end space-x-1">
                            <button onClick={() => window.open(`https://api.whatsapp.com/send?phone=${b.clientPhone.replace(/\D/g, '')}&text=Olá! Sou corretor da Suzuki Imóveis e gostaria de confirmar seu agendamento de visita...`)} className="p-1 px-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded text-[10px] font-semibold flex items-center space-x-1 cursor-pointer">
                              <Icon name="message" className="h-3.5 w-3.5" />
                              <span>WhatsApp</span>
                            </button>
                            <button onClick={() => handleDeleteBooking(b.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded select-none cursor-pointer">
                              <Icon name="trash" className="h-4.5 w-4.5" />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {tab === 'database' && (
            <div className="space-y-6">
              <div className="bg-white border rounded-xl shadow-md p-6 sm:p-8 space-y-6">
                <div>
                  <h3 className="text-base font-extrabold text-stone-900 border-b pb-3 border-stone-100 flex items-center space-x-2">
                    <Icon name="database" className="h-5 w-5 text-brand-gold" />
                    <span>Conexão Supabase Cloud</span>
                  </h3>
                  <p className="text-xs text-stone-500 mt-1">Conecte o seu catálogo e visitas a um banco de dados relacional robusto hospedado na nuvem.</p>
                </div>

                <form onSubmit={handleSaveDbConfig} className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Supabase URL</label>
                      <input 
                        type="url" 
                        required 
                        placeholder="https://your-project.supabase.co" 
                        value={dbUrl} 
                        onChange={(e) => setDbUrl(e.target.value)} 
                        className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs font-mono" 
                      />
                    </div>
                    <div>
                      <label className="text-[10px] font-mono text-stone-400 block mb-1 uppercase font-bold">Supabase Anon Key</label>
                      <input 
                        type="password" 
                        required 
                        placeholder="eyJhbGciOi..." 
                        value={dbKey} 
                        onChange={(e) => setDbKey(e.target.value)} 
                        className="w-full px-2.5 py-1.5 bg-stone-50 border rounded text-xs font-mono" 
                      />
                    </div>
                  </div>

                  <div className="flex items-center space-x-3 p-3 bg-stone-50 rounded-lg">
                    <input 
                      type="checkbox" 
                      id="dbEnabledCheckbox" 
                      checked={dbEnabled} 
                      onChange={(e) => setDbEnabled(e.target.checked)} 
                      className="h-4 w-4 text-brand-gold border-stone-300 rounded focus:ring-brand-gold cursor-pointer" 
                    />
                    <label htmlFor="dbEnabledCheckbox" className="text-xs font-bold text-stone-800 cursor-pointer select-none">
                      Ativar Sincronização em Tempo Real (Supabase)
                    </label>
                  </div>

                  <div className="flex flex-wrap gap-3 pt-2">
                    <button type="submit" className="px-5 py-2 bg-stone-900 hover:bg-stone-950 text-white text-xs font-bold rounded-lg uppercase tracking-wider cursor-pointer">
                      Salvar Configurações
                    </button>
                    
                    <button 
                      type="button" 
                      onClick={handleTestConnection} 
                      disabled={testStatus === 'testing'}
                      className={`px-4 py-2 border text-xs font-semibold rounded-lg flex items-center space-x-2 cursor-pointer ${
                        testStatus === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                        testStatus === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-white hover:bg-stone-50 text-stone-700'
                      }`}
                    >
                      {testStatus === 'testing' ? (
                        <span>Testando...</span>
                      ) : testStatus === 'success' ? (
                        <span>Conectado com sucesso!</span>
                      ) : testStatus === 'error' ? (
                        <span>Erro na conexão!</span>
                      ) : (
                        <span>Testar Conexão</span>
                      )}
                    </button>
                  </div>
                </form>
              </div>

              <div className="bg-white border rounded-xl shadow-md p-6 sm:p-8 space-y-4">
                <div>
                  <h4 className="text-xs font-bold text-stone-900 uppercase font-mono tracking-wider">Migração de Dados Locais</h4>
                  <p className="text-xs text-stone-500 mt-0.5">Clique abaixo para migrar os imóveis e visitas salvos neste navegador para as tabelas criadas no Supabase.</p>
                </div>
                
                <div>
                  <button 
                    onClick={handleSyncDataToCloud} 
                    disabled={syncStatus === 'syncing'}
                    className="px-5 py-2.5 bg-brand-gold hover:bg-brand-gold-dark text-white text-xs font-bold rounded-lg uppercase tracking-wider flex items-center space-x-2 cursor-pointer"
                  >
                    <Icon name="upload" className="h-4 w-4" />
                    <span>{syncStatus === 'syncing' ? 'Sincronizando...' : 'Enviar Dados para a Nuvem'}</span>
                  </button>
                  {syncStatus === 'success' && syncResult && (
                    <p className="text-xs text-emerald-600 font-bold mt-2 font-mono">
                      Sucesso! {syncResult.propertiesSynced} imóveis e {syncResult.bookingsSynced} agendamentos integrados.
                    </p>
                  )}
                </div>
              </div>

              <div className="bg-white border rounded-xl shadow-md p-6 sm:p-8 space-y-4">
                <div className="flex justify-between items-baseline">
                  <div>
                    <h4 className="text-xs font-bold text-stone-900 uppercase font-mono tracking-wider">Script SQL de Inicialização</h4>
                    <p className="text-xs text-stone-500 mt-0.5">Execute o script abaixo no SQL Editor do seu Supabase para criar as tabelas corretas antes de salvar.</p>
                  </div>
                  <button onClick={handleCopySql} className="text-xs text-brand-gold hover:text-brand-gold-dark font-bold underline cursor-pointer">
                    {copiedSql ? 'Copiado!' : 'Copiar Script SQL'}
                  </button>
                </div>

                <pre className="p-4 bg-stone-900 text-emerald-400 font-mono text-[10px] rounded-lg overflow-x-auto max-h-48 border border-stone-950">
                  {SUPABASE_SQL_SETUP}
                </pre>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- APPLICATION BOOTSTRAP ---
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
